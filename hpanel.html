const Avatar = ({ name, size = 'md', className = '' }) => {
    const getInitials = (name) => {
        if (!name) return '?';
        const names = name.trim().split(' ');
        if (names.length > 1) {
            return `${names[0][0]}${names[names.length - 1][0]}`.toUpperCase();
        }
        return name.substring(0, 2).toUpperCase();
    };

    const getBackgroundColor = (name) => {
        if (!name) return 'bg-gray-500';
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        const colors = [
            'bg-red-500', 'bg-orange-500', 'bg-amber-500', 'bg-lime-500',
            'bg-green-500', 'bg-emerald-500', 'bg-teal-500', 'bg-cyan-500', 'bg-sky-500',
            'bg-blue-500', 'bg-indigo-500', 'bg-violet-500', 'bg-purple-500',
            'bg-fuchsia-500', 'bg-pink-500', 'bg-rose-500'
        ];
        return colors[Math.abs(hash) % colors.length];
    };
    
    const sizeClasses = {
        'sm': 'w-8 h-8 text-xs',
        'md': 'w-10 h-10 text-sm',
        'lg': 'w-16 h-16 text-xl',
        'xl': 'w-24 h-24 text-3xl'
    }

    return (
        <div className={`rounded-full flex items-center justify-center text-white font-bold flex-shrink-0 ${getBackgroundColor(name)} ${sizeClasses[size]} ${className}`}>
            {getInitials(name)}
        </div>
    );
};

const getServiceStatus = (service) => {
    if (service.status === 'Suspended') return 'Suspended';
    const now = new Date();
    const expiry = new Date(service.expiryDate);
    const daysLeft = (expiry - now) / (1000 * 60 * 60 * 24);
    if (daysLeft < 0) return 'Jatuh Tempo';
    if (daysLeft <= 30) return 'Akan Berakhir';
    return 'Aktif';
};

function App() {
    const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
    const [currentPage, setCurrentPage] = React.useState('dashboard');
    const [lastPage, setLastPage] = React.useState('dashboard');
    const [selectedCustomerId, setSelectedCustomerId] = React.useState(null);
    
    // Data states
    const [customers, setCustomers] = React.useState(initialCustomers);
    const [services, setServices] = React.useState(initialServices);
    const [invoices, setInvoices] = React.useState(initialInvoices);
    const [products, setProducts] = React.useState(initialProducts);
    const [notificationTemplates, setNotificationTemplates] = React.useState(initialNotificationTemplates);
    const [notifications, setNotifications] = React.useState([]);
    
    // UI states
    const [toasts, setToasts] = React.useState([]);
    const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
    const [isNotificationCenterOpen, setIsNotificationCenterOpen] = React.useState(false);
    const [activityLog, setActivityLog] = React.useState([]);

    // Modal states
    const [provisionDetails, setProvisionDetails] = React.useState(null);
    const [isCustomerModalOpen, setIsCustomerModalOpen] = React.useState(false);
    const [customerToEdit, setCustomerToEdit] = React.useState(null);
    const [isProductModalOpen, setIsProductModalOpen] = React.useState(false);
    const [productToEdit, setProductToEdit] = React.useState(null);
    const [productToDelete, setProductToDelete] = React.useState(null);
    const [isConfirmDeleteProductOpen, setIsConfirmDeleteProductOpen] = React.useState(false);

    const addToast = (message, type = 'info') => { setToasts(prev => [...prev, { id: Date.now(), message, type }]); };
    const removeToast = (id) => { setToasts(prev => prev.filter(t => t.id !== id)); };

    const addActivityLog = React.useCallback((type, message) => {
        const newLog = { id: Date.now(), timestamp: new Date(), type, message };
        setActivityLog(prev => [newLog, ...prev].slice(0, 50));
    }, []);

    const addNotification = React.useCallback((type, message, metadata = {}) => {
        const newNotification = { id: Date.now(), timestamp: new Date(), type, message, read: false, metadata };
        setNotifications(prev => [newNotification, ...prev].slice(0, 50));
    }, []);

    const markNotificationAsRead = (id) => { setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n)); };
    const markAllNotificationsAsRead = () => { setNotifications(prev => prev.map(n => ({ ...n, read: true }))); };

    React.useEffect(() => {
        if (isAdminLoggedIn && activityLog.length === 0) {
            addActivityLog('info', 'Admin berhasil masuk ke sistem.');
        }
    }, [isAdminLoggedIn, addActivityLog, activityLog.length]);
    
    const sendSystemEmail = (templateKey, data) => {
        const template = notificationTemplates[templateKey];
        if (!template || !template.enabled) return;
        
        const customer = customers.find(c => c.id === data.customerId);
        if (!customer) return;

        let subject = template.subject.replace('{nama_pelanggan}', customer.name);
        let body = template.body.replace('{nama_pelanggan}', customer.name).replace('{email_pelanggan}', customer.email);

        if (data.invoice) {
            subject = subject.replace('{nomor_invoice}', data.invoice.id).replace('{jumlah_tagihan}', data.invoice.amount.toLocaleString('id-ID')).replace('{tanggal_jatuh_tempo}', new Date(data.invoice.dueDate).toLocaleDateString('id-ID'));
            body = body.replace('{nomor_invoice}', data.invoice.id).replace('{jumlah_tagihan}', data.invoice.amount.toLocaleString('id-ID')).replace('{tanggal_jatuh_tempo}', new Date(data.invoice.dueDate).toLocaleDateString('id-ID'));
        }
        if (data.service) {
             subject = subject.replace('{nama_layanan}', data.service.name);
             body = body.replace('{nama_layanan}', data.service.name).replace('{tanggal_kadaluarsa_baru}', new Date(data.service.expiryDate).toLocaleDateString('id-ID'));
        }

        console.log(`--- SIMULASI EMAIL ---\nKe: ${customer.email}\nSubjek: ${subject}\nIsi:\n${body}\n--------------------`);
        addToast(`Simulasi email '${templateKey}' dikirim ke ${customer.email}`, 'info');
    };

    // Customer Handlers
    const handleOpenAddCustomerModal = () => { setCustomerToEdit(null); setIsCustomerModalOpen(true); };
    const handleOpenEditCustomerModal = (customer) => { setCustomerToEdit(customer); setIsCustomerModalOpen(true); };
    const handleSaveCustomer = (customerData, isNew) => {
        setCustomers(prev => isNew ? [...prev, customerData] : prev.map(c => c.id === customerData.id ? customerData : c));

            addToast('Menyimpan layanan...', 'info');
            setTimeout(() => { addToast('Membuat akun di server...', 'info'); }, 1500);

                addToast('Mengirim email selamat datang...', 'info');

            addToast('Layanan berhasil diperbarui', 'success');
            addActivityLog('info', `Layanan '${serviceData.name}' telah diperbarui.`);
        }
    };

        const paidInvoice = invoices.find(inv => inv.id === invoiceId);
        if (!paidInvoice) return;
        
        if (newStatus !== 'Lunas') {
            setInvoices(prev => prev.map(inv => inv.id === invoiceId ? { ...inv, status: newStatus } : inv));
            return;
        }

        const serviceToUpdate = services.find(s => s.id === paidInvoice.serviceId);
        setInvoices(prevInvoices => prevInvoices.map(inv => inv.id === invoiceId ? { ...inv, status: 'Lunas' } : inv));
        
        let newExpiryDate;
        if (serviceToUpdate) {
            const currentExpiry = new Date(serviceToUpdate.expiryDate);
            newExpiryDate = new Date(currentExpiry.setFullYear(currentExpiry.getFullYear() + 1));
            setServices(prevServices => prevServices.map(s => s.id === serviceToUpdate.id ? { ...s, expiryDate: newExpiryDate, status: 'Aktif' } : s));
        }
        
        const message = `Pembayaran untuk invoice ${paidInvoice.id} diterima.`;
        addToast(message, 'success');
        addActivityLog('success', `Invoice ${paidInvoice.id} (${serviceToUpdate?.name || 'N/A'}) telah lunas.`);
        addNotification('payment_received', message, { invoiceId: paidInvoice.id });
        sendSystemEmail('payment_confirmation', { customerId: paidInvoice.customerId, invoice: paidInvoice, service: serviceToUpdate ? { ...serviceToUpdate, expiryDate: newExpiryDate } : null });
    };
    const handleResendInvoice = (invoiceId) => {
        const invoice = invoices.find(inv => inv.id === invoiceId);
        if (!invoice) return;
        const customer = customers.find(c => c.id === invoice.customerId);
        if (!customer) return;
        
        addToast(`Invoice ${invoiceId} dikirim ulang ke ${customer.email}`, 'info');
        addActivityLog('info', `Invoice ${invoiceId} dikirim ulang ke ${customer.email}.`);
        addNotification('reminder_sent', `Pengingat invoice ${invoiceId} dikirim ulang.`, { invoiceId });
        sendSystemEmail('payment_reminder', { customerId: invoice.customerId, invoice });
    };
    const handleAddNote = (customerId, noteText) => {
        const newNote = { id: Date.now(), text: noteText, date: new Date() };
        setCustomers(prev => prev.map(c => c.id === customerId ? { ...c, notes: [newNote, ...c.notes] } : c));
        const customer = customers.find(c => c.id === customerId);
        addToast(`Catatan ditambahkan untuk ${customer?.name}`, 'success');
        addActivityLog('note', `Catatan baru ditambahkan untuk pelanggan ${customer?.name}.`);
    };
    const handleDeleteService = (serviceId) => {
        const service = services.find(s => s.id === serviceId);
        setServices(prev => prev.filter(s => s.id !== serviceId));
        addToast('Layanan berhasil dihapus', 'success');
        addActivityLog('warning', `Layanan '${service?.name}' telah dihapus.`);
    }

    const handleOpenAddProductModal = () => { setProductToEdit(null); setIsProductModalOpen(true); };
    const handleOpenEditProductModal = (product) => { setProductToEdit(product); setIsProductModalOpen(true); };
    const handleSaveProduct = (productData, isNew) => {
        setProducts(prev => isNew ? [...prev, productData] : prev.map(p => p.id === productData.id ? productData : p));
        const message = isNew ? `Produk '${productData.name}' berhasil ditambahkan` : `Produk '${productData.name}' berhasil diperbarui`;
        addToast(message, 'success');
        addActivityLog('product', message);
        setIsProductModalOpen(false);
    };
    const handleOpenDeleteProductModal = (product) => { setProductToDelete(product); setIsConfirmDeleteProductOpen(true); };
    const handleConfirmDeleteProduct = () => {
        if (!productToDelete) return;
        setProducts(prev => prev.filter(p => p.id !== productToDelete.id));
        addToast(`Produk '${productToDelete.name}' berhasil dihapus`, 'success');
        addActivityLog('warning', `Produk '${productToDelete.name}' telah dihapus.`);

    };

    const handleManageCustomer = (customerId) => { setLastPage(currentPage); setSelectedCustomerId(customerId); };
    const handleBackFromDetail = () => { setCurrentPage(lastPage); setSelectedCustomerId(null); };
    const selectedCustomer = React.useMemo(() => customers.find(c => c.id === selectedCustomerId), [customers, selectedCustomerId]);
    
    if (!isAdminLoggedIn) return React.createElement(LoginPage, { onLoginSuccess: () => setIsAdminLoggedIn(true) });
    
    const NavItem = ({ icon, label, page }) => (React.createElement('li', null, React.createElement('a', { href: "#", onClick: (e) => { e.preventDefault(); setCurrentPage(page); setSelectedCustomerId(null); setIsSidebarOpen(false); }, className: `flex items-center px-4 py-3 my-1 rounded-lg transition-colors ${currentPage === page && !selectedCustomerId ? 'bg-sky-500 text-white font-semibold' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}` }, icon, React.createElement('span', { className: "ml-3" }, label))));
    
    const unreadNotificationsCount = notifications.filter(n => !n.read).length;

    const SidebarContent = () => (
        React.createElement(React.Fragment, null,
            React.createElement('div', { className: "flex items-center justify-center p-4 border-b border-gray-700 h-16" }, React.createElement('h1', { className: "font-bold text-2xl text-white" }, 'HPanel')),
            React.createElement('nav', { className: "p-4 flex-1" },
                React.createElement('ul', null,
                    React.createElement(NavItem, { icon: React.createElement(lucide.BarChart2, { size: 20 }), label: "Dasbor", page: "dashboard" }),
                    React.createElement(NavItem, { icon: React.createElement(lucide.Users, { size: 20 }), label: "Pelanggan", page: "customers" }),
                    React.createElement(NavItem, { icon: React.createElement(lucide.FileText, { size: 20 }), label: "Tagihan", page: "invoices" }),
                    React.createElement(NavItem, { icon: React.createElement(lucide.Layers, { size: 20 }), label: "Semua Layanan", page: "services" }),
                    React.createElement(NavItem, { icon: React.createElement(lucide.Package, { size: 20 }), label: "Produk", page: "products" }),
                    React.createElement(NavItem, { icon: React.createElement(lucide.Zap, { size: 20 }), label: "Otomatisasi", page: "automation" }),
                    React.createElement(NavItem, { icon: React.createElement(lucide.Settings, { size: 20 }), label: "Pengaturan", page: "settings" })
                )
            ),
            React.createElement('div', { className: "p-4 border-t border-gray-700" }, React.createElement('button', { onClick: () => setIsAdminLoggedIn(false), className: "w-full flex items-center px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-700 hover:text-white transition-colors" }, React.createElement(lucide.Power, { size: 20 }), React.createElement('span', { className: "ml-3" }, 'Keluar')))
        )
    );

    return (
        React.createElement('div', { className: "flex h-screen bg-slate-100 font-sans" },
            toasts.map(toast => React.createElement(Toast, { key: toast.id, ...toast, onDismiss: () => removeToast(toast.id) })),
            React.createElement(ProvisionResultModal, { isOpen: !!provisionDetails, onClose: () => setProvisionDetails(null), details: provisionDetails }),
            React.createElement(CustomerModal, { isOpen: isCustomerModalOpen, onClose: () => setIsCustomerModalOpen(false), onSave: handleSaveCustomer, customer: customerToEdit }),
            React.createElement(ProductModal, { isOpen: isProductModalOpen, onClose: () => setIsProductModalOpen(false), onSave: handleSaveProduct, product: productToEdit }),
            React.createElement(ConfirmModal, { isOpen: isConfirmDeleteProductOpen, onClose: () => setIsConfirmDeleteProductOpen(false), onConfirm: handleConfirmDeleteProduct, title: "Konfirmasi Hapus Produk", message: `Anda yakin ingin menghapus produk "${productToDelete?.name}"? Tindakan ini tidak dapat diurungkan.` }),
            
            React.createElement('div', { className: `fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden transition-opacity ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`, onClick: () => setIsSidebarOpen(false) }),
            React.createElement('aside', { className: `fixed top-0 left-0 h-full w-64 bg-gray-900 flex flex-col z-50 transform transition-transform md:hidden ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}` }, React.createElement(SidebarContent, null)),
            React.createElement('aside', { className: "w-64 bg-gray-900 flex-shrink-0 hidden md:flex flex-col" }, React.createElement(SidebarContent, null)),
            
            React.createElement('div', { className: "flex-1 flex flex-col overflow-hidden" },
                React.createElement('header', { className: "bg-white shadow-sm flex justify-between items-center p-4 h-16 z-30" },
                    React.createElement('button', { onClick: () => setIsSidebarOpen(!isSidebarOpen), className: "md:hidden text-gray-600" }, React.createElement(lucide.Menu, { size: 24 })),
                    React.createElement('div', { className: "hidden md:block" }),
                    React.createElement('div', { className: "flex items-center gap-4" },
                        React.createElement('div', { className: "relative" },
                            React.createElement('button', { onClick: () => setIsNotificationCenterOpen(prev => !prev), className: "text-gray-600 hover:text-sky-500 relative" },
                                React.createElement(lucide.Bell, { size: 22 }),
                                unreadNotificationsCount > 0 && React.createElement('span', { className: "absolute -top-1 -right-1.5 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-xs font-bold text-white" }, unreadNotificationsCount)
                            ),

                    )

                React.createElement('main', { className: "flex-1 overflow-x-hidden overflow-y-auto bg-slate-100 p-4 sm:p-6 lg:p-8" },
                    selectedCustomerId ? (

                    ) : currentPage === 'dashboard' ? (
                        React.createElement(AdminDashboard, { customers: customers, services: services, invoices: invoices, onManageCustomer: handleManageCustomer, activityLog: activityLog, addToast: addToast, addActivityLog: addActivityLog, addNotification: addNotification })
                    ) : currentPage === 'customers' ? (
                        React.createElement(CustomerList, { customers: customers, onSelectCustomer: handleManageCustomer, onAddCustomer: handleOpenAddCustomerModal, onEditCustomer: handleOpenEditCustomerModal, addToast: addToast, addActivityLog: addActivityLog })
                    ) : currentPage === 'invoices' ? (
                        React.createElement(AllInvoicesView, { invoices: invoices, customers: customers, services: services, onUpdateInvoiceStatus: handleUpdateInvoiceStatus, onResendInvoice: handleResendInvoice, onManageCustomer: handleManageCustomer })
                    ) : currentPage === 'services' ? (
                        React.createElement(AllServicesView, { services: services, customers: customers, onManageCustomer: handleManageCustomer })
                    ) : currentPage === 'products' ? (
                        React.createElement(ProductManagementView, { products: products, onAddProduct: handleOpenAddProductModal, onEditProduct: handleOpenEditProductModal, onDeleteProduct: handleOpenDeleteProductModal })
                    ) : currentPage === 'automation' ? (
                        React.createElement(AutomationView, { services: services, invoices: invoices, addToast: addToast, setInvoices: setInvoices, setServices: setServices, addActivityLog: addActivityLog, addNotification: addNotification })
